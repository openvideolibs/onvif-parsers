name: Update contributors

on:
  push:
    branches:
      - main

# Grant the necessary permissions for the bot to push code and open a PR
permissions:
  contents: write
  pull-requests: write

jobs:
  contrib-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update contributors
        uses: con/tributors@0.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Run pre-commit to fix formatting issues introduced by con/tributors
      # The '|| true' ensures the workflow doesn't crash if pre-commit makes a fix
      - name: Fix formatting with pre-commit
        run: |
          pip install pre-commit
          pre-commit run --all-files || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          title: "Update contributors"
          commit-message: "chore: update contributors"
          body: "Update contributors file with new contributors."
          branch: "tributors/update"
          delete-branch: true
